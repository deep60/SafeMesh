apiVersion: apps/v1
kind: Deployment
metadata:
  name: safemesh-backend
  namespace: safemesh
  labels:
    app: safemesh
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safemesh
      component: backend
  template:
    metadata:
      labels:
        app: safemesh
        component: backend
    spec:
      containers:
        - name: safemesh-backend
          image: safemesh/backend:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              value: "sqlite:/app/data/vpn.db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: safemesh-secrets
                  key: jwt-secret
            - name: JWT_EXPIRES_IN
              value: "3600"
            - name: REFRESH_TOKEN_EXPIRES_DAYS
              value: "30"
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: safemesh-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: safemesh-backend-svc
  namespace: safemesh
spec:
  selector:
    app: safemesh
    component: backend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: safemesh-db-pvc
  namespace: safemesh
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: safemesh-secrets
  namespace: safemesh
type: Opaque
data:
  # base64 encoded: echo -n "change_me_in_production" | base64
  jwt-secret: Y2hhbmdlX21lX2luX3Byb2R1Y3Rpb24=
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safemesh-ingress
  namespace: safemesh
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit-rps: "30"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.safemesh.com
      secretName: safemesh-tls
  rules:
    - host: api.safemesh.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: safemesh-backend-svc
                port:
                  number: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: safemesh
