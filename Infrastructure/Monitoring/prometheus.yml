# Prometheus configuration for SafeMesh VPN monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # SafeMesh Backend API
  - job_name: 'safemesh-backend'
    metrics_path: '/api/v1/health'
    scheme: http
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'safemesh-api'
          environment: 'production'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Nginx monitoring (requires nginx-exporter)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
        labels:
          service: 'nginx'
